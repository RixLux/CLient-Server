site_name: "CLient-Server Documentation"
site_description: "Documentation"
site_url: "https://rixlux.github.io/CLient-Server/"

repo_name: "RixLux/CLient-Server"
repo_url: "https://github.com/RixLux/CLient-Server"

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep-purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  generator: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

plugins:
  - search
  - i18n:
      languages:
        - locale: id
          name: Bahasa Indonesia
          build: true
        - locale: en
          default: true
          name: English
          build: true
  - swagger-ui-tag
  # - render_swagger
  - git-revision-date-localized:
      enable_creation_date: !ENV [CI, false]
      fallback_to_build_date: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Tugas1: Tugas1.md
  - Tugas2: Tugas2.md
  - Tugas3: Tugas3.md
  - Tugas4: Tugas4.md
  - Tugas5: Tugas5.md
  - Tugas6: Tugas6.md
  - Tugas7: Tugas7.md
  - About: about.md
